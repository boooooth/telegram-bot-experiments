name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements-dev.txt ruff mypy

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Type check
        run: mypy bot/ --ignore-missing-imports

      - name: Tests
        run: pytest -q

      - name: Docker build check
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
